<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rashmi Sharma — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Mono',monospace;}

/* ──── LOADING SCREEN ──── */
#loadingWrap{
  width:100%;height:100vh;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  position:fixed;inset:0;z-index:100;overflow:hidden;
}
canvas#c3d{position:absolute;inset:0;width:100%;height:100%;}
.ui{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;gap:18px;
  pointer-events:none;
}
#num{
  font-size:clamp(60px,10vw,90px);
  font-weight:700;color:#fff;
  letter-spacing:-0.04em;line-height:1;
  text-shadow:0 0 40px rgba(53,132,228,0.9);
}
#num span{font-size:clamp(28px,4vw,40px);color:#3584e4;vertical-align:super;}
#status{
  font-size:11px;letter-spacing:0.22em;
  color:rgba(53,132,228,0.65);
  text-transform:uppercase;
}
#loadingWrap.exit{animation:exitAnim 1.1s cubic-bezier(.4,0,1,1) forwards;}
@keyframes exitAnim{
  0%{opacity:1;transform:scale(1);}
  60%{opacity:0.4;transform:scale(1.06);}
  100%{opacity:0;transform:scale(1.1);pointer-events:none;}
}

/* ──── MAIN PORTFOLIO ──── */
:root {
  --navy: #03152e;
  --blue-deep: #0a2a5e;
  --blue-mid: #1a5fb4;
  --blue-bright: #3584e4;
  --blue-light: #62a0ea;
  --blue-pale: #99c1f1;
  --white: #ffffff;
  --off-white: #f0f6ff;
}

#mainContent{
  width:100%;height:100%;overflow:hidden;background:var(--navy);opacity:0;
  pointer-events:none;transition:opacity 0.8s ease 0.6s;
}
#mainContent.show{opacity:1;pointer-events:auto;}

/* animated grid background */
#mainContent::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(26,95,180,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,95,180,0.1) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridShift 20s linear infinite;
}
@keyframes gridShift {
  0%   { background-position: 0 0; }
  100% { background-position: 48px 48px; }
}

/* floating orbs */
.orb {
  position: fixed; border-radius: 50%; filter: blur(60px);
  pointer-events: none; z-index: 0;
  animation: orbFloat 8s ease-in-out infinite alternate;
}
.orb-1 { width:380px; height:380px; background:rgba(26,95,180,0.18); top:-80px; left:-100px; animation-delay:0s; }
.orb-2 { width:260px; height:260px; background:rgba(53,132,228,0.12); bottom:40px; right:-60px; animation-delay:-3s; }
.orb-3 { width:180px; height:180px; background:rgba(99,160,234,0.1); top:40%; left:55%; animation-delay:-6s; }
@keyframes orbFloat {
  from { transform: translate(0, 0); }
  to   { transform: translate(20px, 30px); }
}

/* main scene */
#scene {
  position: relative; z-index: 1;
  width: 100%; height: 100vh;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 0;
  overflow: hidden;
}

/* avatar column */
#avatar-col {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-end;
  flex-shrink: 0;
  width: 320px;
}

/* image sequence with zoom */
.image-sequence {
  position: absolute;
  bottom: 0;
  width: 300px;
  height: 400px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}

.sequence-image {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center bottom;
  opacity: 0;
  transform: scale(0.8);
  pointer-events: none;
}

.sequence-image.active {
  animation: zoomIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.sequence-image.hide {
  animation: fadeOutImage 0.8s ease-out forwards;
}

@keyframes zoomIn {
  0% {
    opacity: 0;
    transform: scale(0.8) translateY(40px);
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes fadeOutImage {
  0% {
    opacity: 1;
    transform: scale(1);
  }
  100% {
    opacity: 0;
    transform: scale(0.9);
  }
}

/* glow ring beneath avatar */
#avatar-col::after {
  content: '';
  position: absolute; bottom: -10px;
  width: 200px; height: 30px;
  background: radial-gradient(ellipse, rgba(53,132,228,0.35) 0%, transparent 70%);
  border-radius: 50%;
  z-index: -1;
}

/* rotating code card */
.code-card-wrapper {
  position: absolute;
  bottom: 60px;
  right: 60px;
  perspective: 1200px;
  z-index: 5;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease-out;
}

.code-card {
  width: 280px;
  height: 180px;
  background: linear-gradient(135deg, rgba(26,95,180,0.15) 0%, rgba(53,132,228,0.08) 100%);
  border: 1px solid rgba(53,132,228,0.3);
  border-radius: 8px;
  padding: 20px;
  backdrop-filter: blur(10px);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--blue-pale);
  line-height: 1.6;
  overflow: hidden;
  position: relative;
  animation: rotateCard 6s infinite linear;
  transform-style: preserve-3d;
}

@keyframes rotateCard {
  0% {
    transform: rotateY(0deg) rotateX(8deg);
  }
  50% {
    transform: rotateY(180deg) rotateX(8deg);
  }
  100% {
    transform: rotateY(360deg) rotateX(8deg);
  }
}

.code-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(53,132,228,0.15), transparent);
  animation: shimmer 2.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.code-content {
  position: relative;
  z-index: 1;
}

.code-line {
  margin: 4px 0;
}

.code-keyword { color: var(--blue-bright); }
.code-string { color: #8be9fd; }

/* text column */
#text-col {
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 0 80px 48px;
  flex: 1; max-width: 640px;
  opacity: 0;
  transform: translateX(40px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
#text-col.visible {
  opacity: 1;
  transform: translateX(0);
}

.greeting {
  font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--blue-bright); margin-bottom: 16px;
  opacity: 0; animation: none;
}
.greeting.show { animation: fadeUp 0.5s ease forwards; }

.name-line {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(42px, 6vw, 72px);
  line-height: 1.05;
  color: var(--white);
  overflow: hidden;
}
.name-line span {
  display: inline-block;
  opacity: 0; transform: translateY(100%);
}
.name-line span.drop { animation: dropIn 0.6s cubic-bezier(.22,.61,.36,1) forwards; }

.divider {
  width: 0px; height: 2px;
  background: linear-gradient(90deg, var(--blue-bright), transparent);
  margin: 20px 0;
  transition: width 0.8s ease 0.3s;
}
.divider.expand { width: 280px; }

.role-wrap {
  font-family: 'DM Mono', monospace;
  font-size: clamp(14px, 2vw, 18px);
  color: var(--blue-pale);
  line-height: 1.6;
  min-height: 54px;
}

#typed-text {
  display: inline;
}
#cursor {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--blue-bright);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.tags {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 28px;
  opacity: 0; transition: opacity 0.6s ease 0.2s;
}
.tags.show { opacity: 1; }
.tag {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 6px 14px;
  border: 1px solid rgba(53,132,228,0.4);
  border-radius: 20px;
  color: var(--blue-light);
  background: rgba(26,95,180,0.1);
}

.cta-row {
  display: flex; gap: 16px; margin-top: 36px;
  opacity: 0; transition: opacity 0.6s ease 0.4s;
}
.cta-row.show { opacity: 1; }
.btn-primary {
  padding: 12px 28px;
  background: var(--blue-mid);
  color: var(--white); border: none;
  border-radius: 4px; font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 0.05em;
  cursor: pointer; transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: var(--blue-bright); transform: translateY(-1px); }
.btn-outline {
  padding: 12px 28px;
  background: transparent;
  color: var(--blue-pale); border: 1px solid rgba(99,160,234,0.4);
  border-radius: 4px; font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 0.05em;
  cursor: pointer; transition: border-color 0.2s, color 0.2s, transform 0.15s;
}
.btn-outline:hover { border-color: var(--blue-bright); color: var(--white); transform: translateY(-1px); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes dropIn {
  from { opacity:0; transform:translateY(100%); }
  to   { opacity:1; transform:translateY(0); }
}

/* corner brackets */
.bracket {
  position: fixed; width: 40px; height: 40px;
  border-color: rgba(53,132,228,0.3); border-style: solid;
  pointer-events: none; z-index: 2;
}
.bracket-tl { top:24px; left:24px; border-width: 1.5px 0 0 1.5px; }
.bracket-tr { top:24px; right:24px; border-width: 1.5px 1.5px 0 0; }
.bracket-bl { bottom:24px; left:24px; border-width: 0 0 1.5px 1.5px; }
.bracket-br { bottom:24px; right:24px; border-width: 0 1.5px 1.5px 0; }
</style>
</head>

  // ── Initialize image sequence ──
  function initializeImageSequence() {
    const container = document.getElementById('imageSequence');
    
    imageSequence.forEach((img, index) => {
      const imgEl = document.createElement('img');
      // Use fallback image if primary doesn't load
      imgEl.src = img.src;
      imgEl.alt = `Sequence image ${index + 1}`;
      imgEl.className = 'sequence-image';
      imgEl.id = `seq-img-${index}`;
      
      // Fallback to placeholder if image fails to load
      imgEl.onerror = function() {
        this.src = img.fallback;
      };
      
      container.appendChild(imgEl);

      // Trigger animation at specified delay
      setTimeout(() => {
        imgEl.classList.add('active');
      }, img.delay);

      // Remove 'active' class before next image (keeps it visible but stops animation)
      if (index < imageSequence.length - 1) {
        setTimeout(() => {
          imgEl.classList.remove('active');
        }, img.delay + img.duration);
      }
    });

    // Hide all images after the last one finishes its animation
    const lastImageDelay = imageSequence[imageSequence.length - 1].delay + 
                          imageSequence[imageSequence.length - 1].duration + 500;
    
    setTimeout(() => {
      imageSequence.forEach((_, index) => {
        const imgEl = document.getElementById(`seq-img-${index}`);
        if (imgEl) {
          imgEl.classList.add('hide');
        }
      });
      
      // Start intro text after images finish disappearing
      setTimeout(startIntro, 800);
    }, lastImageDelay);
  }

  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeImageSequence);
  } else {
    initializeImageSequence();
  }

  // ── Text animation sequence ──
  function startIntro() {
    // 1. slide in text column
    const col = document.getElementById('text-col');
    col.classList.add('visible');

    // 2. greeting
    setTimeout(() => {
      document.getElementById('greeting').classList.add('show');
    }, 200);

    // 3. name drop in
    const nameDelay = [400, 650];
    ['n1','n2'].forEach((id, i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        el.classList.add('drop');
      }, nameDelay[i]);
    });

    // 4. divider expand
    setTimeout(() => {
      document.getElementById('divider').classList.add('expand');
    }, 900);

    // 5. typewriter
    setTimeout(() => {
      typeWriter("Hi, I'm a full stack enthusiast", () => {
        // after typing, show tags & CTA
        document.getElementById('tags').classList.add('show');
        document.getElementById('cta-row').classList.add('show');
        // stop cursor blinking after a beat
        setTimeout(() => {
          document.getElementById('cursor').style.display = 'none';
        }, 800);
      });
    }, 1100);

    // 6. show rotating code card (appears alongside text)
    setTimeout(() => {
      document.getElementById('codeCardWrapper').style.opacity = '1';
      document.getElementById('codeCardWrapper').style.pointerEvents = 'auto';
    }, 500);
  }

  function typeWriter(text, onDone) {
    const el = document.getElementById('typed-text');
    el.textContent = '';
    let i = 0;
    const speed = 42; // ms per char
    function tick() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(tick, speed + (Math.random() * 18 - 9));
      } else {
        if (onDone) onDone();
      }
    }
    tick();
  }

})();
